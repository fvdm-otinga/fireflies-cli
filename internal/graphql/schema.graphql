type Query {
  apps(app_id: String, transcript_id: String, skip: Float, limit: Float): Apps
  transcripts(title: String, keyword: String, scope: String, date: Float, fromDate: DateTime, toDate: DateTime, limit: Int = 50, skip: Int = 0, user_id: String, mine: Boolean, organizers: [String!], participants: [String!], channel_id: String, host_email: String, organizer_email: String, participant_email: String): [Transcript!]
  transcript(id: String!): Transcript
  active_meetings(input: GetActiveMeetingsInput): [ActiveMeeting!]
  users: [User!]
  user(id: String): User
  user_groups(mine: Boolean): [UserGroup!]
  analytics(start_time: String, end_time: String): Analytics!
  channels: [Channel!]!
  channel(id: ID!): Channel
  contacts: [Contact!]!
  bites(mine: Boolean, transcript_id: ID, limit: Int, my_team: Boolean, skip: Int): [Bite!]!
  bite(id: ID!): Bite

  """Get a summary of all threads for the current user"""
  askfred_threads(transcript_id: String): [AskFredThreadSummary!]

  """Get a specific thread by ID with all its messages"""
  askfred_thread(id: String!): AskFredThread

  """Get live action items for a meeting"""
  live_action_items(meeting_id: ID!): [LiveActionItem!]!
  rule_executions_by_meeting(limit: Int = 10, cursor: String, logs_per_meeting: Int = 5, filters: RuleExecutionFiltersInput): RuleExecutionsByMeetingResponse!
}

"""
A date-time string at UTC, such as 2019-12-03T09:54:33Z, compliant with the date-time format.
"""
scalar DateTime

input GetActiveMeetingsInput {
  email: String

  """
  Filter by meeting states. Returns both active and paused meetings by default.
  """
  states: [MeetingState!]
}

input RuleExecutionFiltersInput {
  rule_id: String
  meeting_id: String
  date_from: String
  date_to: String

  """
  Filter by test evaluations. When true, returns only test logs. When false, returns only non-test logs. When not provided, returns all logs.
  """
  is_test: Boolean
}

type Mutation {
  updateMeetingTitle(input: UpdateMeetingTitleInput!): Transcript!
  updateMeetingPrivacy(input: UpdateMeetingPrivacyInput!): Transcript!
  updateMeetingChannel(input: UpdateMeetingChannelInput!): [Transcript!]!
  deleteTranscript(id: String!): Transcript!
  addToLiveMeeting(meeting_link: String!, title: String, meeting_password: String, duration: Int, language: String, attendees: [AttendeeInput!]): AddToLiveMeeting!
  uploadAudio(input: AudioUploadInput): AudioUploadStatus!
  shareMeeting(input: ShareMeetingInput!): ShareMeetingResponse!
  revokeSharedMeetingAccess(input: RevokeSharedMeetingAccessInput!): RevokeSharedMeetingAccessResponse!
  setUserRole(user_id: String!, role: Role!): User!
  createBite(transcript_Id: ID!, name: String, start_time: Float!, end_time: Float!, media_type: String, privacies: [BitePrivacy!], summary: String): Bite!

  """Continue an existing AskFred conversation thread"""
  continueAskFredThread(input: ContinueAskFredThreadInput!): AskFredResponse!

  """
  Create a new AskFred thread with a question. Can be about a specific meeting or across multiple meetings with filters.
  """
  createAskFredThread(input: CreateAskFredThreadInput!): AskFredResponse!

  """Delete an AskFred thread and all its messages"""
  deleteAskFredThread(id: String!): AskFredThread!

  """Update meeting state (pause or resume recording)"""
  updateMeetingState(input: UpdateMeetingStateInput!): UpdateMeetingStateResult!

  """Create a live action item for a meeting"""
  createLiveActionItem(input: CreateLiveActionItemInput!): CreateLiveActionItemResult!

  """Create a live soundbite for a meeting"""
  createLiveSoundbite(input: CreateLiveSoundbiteInput!): CreateLiveSoundbiteResult!
  createUploadUrl(input: CreateUploadUrlInput!): UploadUrlResponse!
  confirmUpload(input: ConfirmUploadInput!): ConfirmUploadResponse!
}

