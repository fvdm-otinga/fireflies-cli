version: 2

project_name: fireflies

before:
  hooks:
    - go mod tidy

builds:
  - id: fireflies
    main: .
    binary: fireflies
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.ShortCommit}}
      - -X main.Date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: fireflies-archive
    ids:
      - fireflies
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - id: fireflies-sbom
    artifacts: archive
    documents:
      - "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}.sbom.json"
    cmd: syft
    args:
      - "${artifact}"
      - "--output"
      - "cyclonedx-json=${document}"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
  groups:
    - title: "New Features"
      regexp: "^feat"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "Other Changes"
      order: 999

release:
  github:
    owner: fvdm-otinga
    name: fireflies-cli
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} {{.Tag}}"

# homebrew_casks replaces the deprecated `brews` in goreleaser v2.
# The directory is set to Formula/ (standard homebrew tap layout for CLI tools).
homebrew_casks:
  - name: fireflies
    ids:
      - fireflies-archive
    repository:
      owner: fvdm-otinga
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/fvdm-otinga/fireflies-cli"
    description: "Token-efficient CLI for the Fireflies.ai GraphQL API"
    license: "MIT"
